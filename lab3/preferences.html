<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Preferințe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Preferințe utilizator</h1>
    <form id="prefsForm">
        <label>
            Nume utilizator:<br>
            <input type="text" id="username" name="username">
        </label><br><br>
        <label>
            Tema:<br>
            <select id="theme" name="theme">
                <option value="light">Luminos</option>
                <option value="dark">Întunecat</option>
            </select>
        </label><br><br>
        <label>
            Limba:<br>
            <select id="language" name="language">
                <option value="ro">Română</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
            </select>
        </label><br><br>
        <label>
            Dimensiune font:<br>
            <select id="fontSize" name="fontSize">
                <option value="14px">14px</option>
                <option value="16px">16px</option>
                <option value="18px">18px</option>
                <option value="20px">20px</option>
            </select>
        </label><br><br>
        <button type="submit">Salvează</button>
    </form>
    <p id="message" style="color:green;"></p>

    <script src="js/cookies.js"></script>
    <script src="js/storage.js"></script>
    <script>
        function applyTheme() {
            const theme = CookieManager.get('theme') || 'light';
            document.body.classList.remove('light', 'dark');
            document.body.classList.add(theme);
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyTheme();
            const storedName = CookieManager.get('username');
            if (storedName) document.getElementById('username').value = storedName;
            const storedTheme = CookieManager.get('theme');
            if (storedTheme) document.getElementById('theme').value = storedTheme;
            const lang = localStorage.getItem('language');
            if (lang) document.getElementById('language').value = lang;
            const font = localStorage.getItem('fontSize');
            if (font) document.getElementById('fontSize').value = font;

            document.getElementById('prefsForm').addEventListener('submit', e => {
                e.preventDefault();
                const name = document.getElementById('username').value.trim();
                const theme = document.getElementById('theme').value;
                const language = document.getElementById('language').value;
                const fontSize = document.getElementById('fontSize').value;
                if (name) CookieManager.set('username', name);
                CookieManager.set('theme', theme);
                localStorage.setItem('language', language);
                localStorage.setItem('fontSize', fontSize);
                document.getElementById('message').textContent = 'Preferințele au fost salvate.';
                applyTheme();
                setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            });
        });
    </script>
</body>
</html>
