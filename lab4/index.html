<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator Tema</title>
    <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
    <main class="calculator-app">
        <section class="calculator">
            <div class="display">
                <div id="expression" class="display-expression">0</div>
                <div id="result" class="display-result">0</div>
            </div>
            <div class="buttons">
                <button class="btn function" data-action="clear">Clear</button>
                <button class="btn function" data-action="divide">/</button>
                <button class="btn function" data-action="multiply">*</button>
                <button class="btn function" data-action="subtract">-</button>

                <button class="btn" data-action="digit" data-value="7">7</button>
                <button class="btn" data-action="digit" data-value="8">8</button>
                <button class="btn" data-action="digit" data-value="9">9</button>
                <button class="btn function" data-action="add">+</button>

                <button class="btn" data-action="digit" data-value="4">4</button>
                <button class="btn" data-action="digit" data-value="5">5</button>
                <button class="btn" data-action="digit" data-value="6">6</button>
                <button class="btn" data-action="equals">=</button>

                <button class="btn" data-action="digit" data-value="1">1</button>
                <button class="btn" data-action="digit" data-value="2">2</button>
                <button class="btn" data-action="digit" data-value="3">3</button>
                <button class="btn" data-action="digit" data-value="0">0</button>
            </div>
        </section>
    </main>

    <script src="scripts/model.js"></script>
    <script src="scripts/view.js"></script>
    <script src="scripts/controller.js"></script>
</body>
</html>
